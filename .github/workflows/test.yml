# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm test

  check:
    name: Check types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint

  npm-audit:
    name: Audit packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - run: npm audit --audit-level=high

  dependency-diff:
    name: Dependency & bundle diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 22
      - name: Build and pack source branch
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
          mkdir -p ./source-packs
          npm pack --pack-destination ./source-packs
      - name: Build and pack base branch
        run: |
          git checkout ${{ github.base_ref }}
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
          mkdir -p ./base-packs
          npm pack --pack-destination ./base-packs
      - name: Run dependency & bundle diff
        uses: e18e/action-dependency-diff@v1
        with:
          base-packages: './base-packs/*.tgz'
          source-packages: './source-packs/*.tgz'
